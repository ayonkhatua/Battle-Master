name: battle_master
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.1.1
  firebase_messaging: ^15.0.3
  flutter_local_notifications: ^17.1.2 # App khuli ho tab pop-up dikhane ke liye isko add kardo

  supabase_flutter: ^2.0.0
  flutter_dotenv: ^6.0.0

  # UI and Icons
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.7.0 
  google_fonts: ^6.2.1
  intl: ^0.19.0

  url_launcher: ^6.3.2
  carousel_slider: ^5.1.2
  shared_preferences: ^2.5.5
  qr_flutter: ^4.1.0
  # 'screens' package is not a standard package, maybe it's a local reference? Removing it for now as it may cause errors.
  # screens: ^2.5.0 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  change_app_package_name: ^1.5.0
  # 🌟 LOGO PACKAGE ADDED HERE 🌟
  flutter_launcher_icons: ^0.13.1

# 🌟 LOGO CONFIGURATION BLOCK 🌟
flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/logo.png" # Dhyan rakhna, image is location par zaroor ho!
  min_sdk_android: 23 
  adaptive_icon_background: "#0f172a" 

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/